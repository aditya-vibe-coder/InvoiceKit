    <text x="28" y="163" fill="#94A3B8" font-family="sans-serif" font-size="9">INV-2024-001 — TechCorp</text>
    <text x="280" y="163" text-anchor="end" fill="#22C55E" font-family="sans-serif" font-size="9" font-weight="bold">₹24,500</text>

    <rect x="16" y="180" rx="8" width="288" height="24" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="28" y="195" fill="#94A3B8" font-family="sans-serif" font-size="9">INV-2024-002 — DesignCo</text>
    <text x="280" y="195" text-anchor="end" fill="#F59E0B" font-family="sans-serif" font-size="9" font-weight="bold">₹12,000</text>

    <rect x="16" y="212" rx="8" width="288" height="24" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="28" y="227" fill="#94A3B8" font-family="sans-serif" font-size="9">INV-2024-003 — Webify</text>
    <text x="280" y="227" text-anchor="end" fill="#22C55E" font-family="sans-serif" font-size="9" font-weight="bold">₹31,200</text>

    <!-- Chart section -->
    <rect x="16" y="250" rx="8" width="288" height="130" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="28" y="270" fill="#64748B" font-family="sans-serif" font-size="8" font-weight="600">Revenue Trend</text>

    <!-- Bar chart -->
    <g transform="translate(28, 278)">
      <rect x="28" y="68" width="28" height="32" rx="3" fill="#22C55E" opacity="0.6" />
      <rect x="60" y="52" width="28" height="48" rx="3" fill="#22C55E" opacity="0.7" />
      <rect x="92" y="60" width="28" height="40" rx="3" fill="#22C55E" opacity="0.8" />
      <rect x="124" y="40" width="28" height="60" rx="3" fill="#22C55E" opacity="0.85" />
      <rect x="156" y="48" width="28" height="52" rx="3" fill="#22C55E" opacity="0.9" />
      <rect x="188" y="24" width="28" height="76" rx="3" fill="#22C55E" opacity="0.95" />
      <rect x="220" y="12" width="28" height="88" rx="3" fill="#22C55E" />
    </g>
  </g>

  <!-- Right Panel: Content -->
  <g transform="translate(440, 140)">
    <!-- Badge -->
    <rect x="0" y="0" rx="999" width="120" height="22" fill="#22C55E" opacity="0.15" />
    <text x="60" y="15" text-anchor="middle" fill="#22C55E" font-family="sans-serif" font-size="10" font-weight="bold">PRIVACY-FIRST</text>

