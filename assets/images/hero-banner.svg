<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenPulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="30" x2="1200" y2="30" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="330" x2="1200" y2="330" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="390" x2="1200" y2="390" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="510" x2="1200" y2="510" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="570" x2="1200" y2="570" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#22C55E" stroke-width="1" />
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#22C55E" stroke-width="1" />
