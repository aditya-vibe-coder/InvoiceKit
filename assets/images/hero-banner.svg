      <rect x="0" y="0" rx="4" width="80" height="24" fill="#334155" />
      <text x="40" y="16" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10">React</text>

      <rect x="90" y="0" rx="4" width="80" height="24" fill="#334155" />
      <text x="130" y="16" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10">Tailwind</text>

      <rect x="180" y="0" rx="4" width="80" height="24" fill="#334155" />
      <text x="220" y="16" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10">Vite</text>

      <rect x="270" y="0" rx="4" width="80" height="24" fill="#334155" />
      <text x="310" y="16" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10">Dexie.js</text>
    </g>

    <!-- CTA button -->
    <g transform="translate(0, 420)">
      <rect x="0" y="0" rx="8" width="200" height="36" fill="url(#accentGrad)" />
      <text x="100" y="23" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold">Start Invoicing Free →</text>
    </g>
