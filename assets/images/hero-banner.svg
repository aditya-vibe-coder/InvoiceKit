    <!-- Tagline -->
    <text x="0" y="140" fill="#94A3B8" font-family="sans-serif" font-size="14">Free GST Invoice Generator</text>
    <text x="0" y="160" fill="#94A3B8" font-family="sans-serif" font-size="14">for Indian Freelancers</text>

    <!-- Feature bullets -->
    <g transform="translate(0, 200)">
      <circle cx="6" cy="-4" r="4" fill="#22C55E" />
      <text x="18" y="0" fill="#CBD5E1" font-family="sans-serif" font-size="13">Auto CGST, SGST &amp; IGST calculation</text>
    </g>
    <g transform="translate(0, 230)">
      <circle cx="6" cy="-4" r="4" fill="#22C55E" />
      <text x="18" y="0" fill="#CBD5E1" font-family="sans-serif" font-size="13">GSTR-1 summary &amp; P&amp;L reports</text>
    </g>
    <g transform="translate(0, 260)">
      <circle cx="6" cy="-4" r="4" fill="#22C55E" />
      <text x="18" y="0" fill="#CBD5E1" font-family="sans-serif" font-size="13">HSN / SAC code support</text>
    </g>
    <g transform="translate(0, 290)">
      <circle cx="6" cy="-4" r="4" fill="#22C55E" />
      <text x="18" y="0" fill="#CBD5E1" font-family="sans-serif" font-size="13">100% offline — data stays on your device</text>
    </g>
    <g transform="translate(0, 320)">
      <circle cx="6" cy="-4" r="4" fill="#22C55E" />
      <text x="18" y="0" fill="#CBD5E1" font-family="sans-serif" font-size="13">PDF export &amp; WhatsApp share</text>
    </g>

