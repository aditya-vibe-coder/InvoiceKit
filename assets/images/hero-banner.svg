    <text x="28" y="98" fill="#64748B" font-family="sans-serif" font-size="8">Revenue</text>
    <text x="28" y="118" fill="#F8FAFC" font-family="sans-serif" font-size="15" font-weight="bold">₹2,48,500</text>

    <rect x="168" y="78" rx="8" width="136" height="56" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="180" y="98" fill="#64748B" font-family="sans-serif" font-size="8">Pending</text>
    <text x="180" y="118" fill="#F59E0B" font-family="sans-serif" font-size="15" font-weight="bold">₹42,300</text>

    <!-- Invoice list -->
